<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Definitions Quiz — Health v1</title>
<style>
body{font-family:system-ui;margin:0;background:#f5f6fa}
header{background:#111;color:#fff;padding:16px}
.app{max-width:900px;margin:auto;padding:20px}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:12px}
textarea,select{width:100%;padding:10px;margin-top:6px}
button{padding:10px 14px;border:none;border-radius:8px;background:#1f6feb;color:#fff;margin-top:8px}
.good{background:#e6f7ec;padding:8px;border-radius:8px}
.bad{background:#fde8ea;padding:8px;border-radius:8px;color:#b00020}
</style>
</head>
<body>
<header><h2>Definitions Quiz — Health v1</h2></header>
<div class="app">

<div class="card">
<label>Orden</label>
<select id="order">
<option value="seq">Secuencial</option>
<option value="rand">Aleatorio</option>
</select>

<label>Criterio</label>
<select id="mode">
<option value="flex">Flexible</option>
<option value="strict">Estricto</option>
</select>

<button onclick="start()">Iniciar práctica</button>
</div>

<div class="card" id="quiz" style="display:none">
<h3 id="term"></h3>
<textarea id="answer"></textarea>
<button onclick="check()">Comprobar</button>
<button onclick="next()">Saltar</button>
<div id="feedback"></div>
</div>

</div>

<script>
const data=[
{term:"Nutritious",defs:["it's something that is in the food and it's good for our body"]},
{term:"Various",defs:["there are different options for something"]},
{term:"Comfortable",defs:["it's when you stay good with something like sleep"]},
{term:"Hygiene",defs:["it's when you are clean"]},
{term:"Environment",defs:["it refers to all things that are surrounding people"]},
{term:"Well-being",defs:["it's a state where you are mentally physically emotionally and socially well"]},
{term:"Quest",defs:["it's a long search for something"]},
{term:"Brisk",defs:["it refers to something quick"]},
{term:"Energizing",defs:["it's something that gives energy"]},
{term:"Beverages",defs:["it refers to all drinks"]},
{term:"Swap",defs:["it refers to change one thing for another"]},
{term:"Overlooked",defs:["it's something that was ignored"]},
{term:"Accomplished",defs:["it's something that is completed successfully"]},
{term:"Hesitate",defs:["it's stop before doing something because you are not sure"]},
{term:"Pare",defs:["it’s to cover a road with stone or asphalt"]},
{term:"Mental health",defs:["it's how well being a person is"]},
{term:"Deal",defs:["it's when you reach an agreement with someone"]},
{term:"Allow",defs:["it’s when you have permission to do something"]},
{term:"As long as",defs:["it refers to something that happens over a period time"]},
{term:"Find out",defs:["it's to discover something"]},
{term:"Overwhelming",defs:["it's when someone press someone to its limits"]},
{term:"Breakdown",defs:["it refers to exceed your limits with problems"]},
{term:"Insight",defs:["it's how you interpret a situation"]},
{term:"Shortness",defs:["it refers to the absence of something"]},
{term:"Statewide",defs:["it's something that applies to all the state"]},
{term:"Astounding",defs:["it's something that surprises you"]},
{term:"Lobbyist",defs:["it's someone that influences in laws government"]},
{term:"Groundbreaking",defs:["it’s something new and different"]},
{term:"Struggle",defs:["it refers to have difficulties to do something"]},
{term:"Step forward",defs:["it’s to offer your help to do something"]},
{term:"Deserve",defs:["it's to have something because of your actions"]},
{term:"Empathy",defs:["it's the ability to understand other people's feelings and problems"]},
{term:"Sympathy",defs:["it refers to an affective feeling to others"]}
];

let pool=[];

function start(){
pool=[...data];
if(document.getElementById("order").value==="rand") pool.sort(()=>Math.random()-0.5);
document.getElementById("quiz").style.display="block";
next();
}

function next(){
if(pool.length===0){alert("Finished");return}
current=pool.shift();
document.getElementById("term").innerText=current.term;
document.getElementById("answer").value="";
document.getElementById("feedback").innerHTML="";
}

function normalize(s){return s.toLowerCase().trim()}

function check(){
let user=normalize(document.getElementById("answer").value);
let correct=current.defs[0];

if(document.getElementById("mode").value==="strict"){
if(user===normalize(correct)){
document.getElementById("feedback").innerHTML='<div class="good">Correcto</div>';
setTimeout(next,500);
}else{
document.getElementById("feedback").innerHTML='<div class="bad">Incorrecto: '+correct+'</div>';
pool.push(current);
}
}else{
if(user.includes("good")||user.includes("energy")||user.includes("search")||user.includes("clean")){
document.getElementById("feedback").innerHTML='<div class="good">Correcto</div>';
setTimeout(next,500);
}else{
document.getElementById("feedback").innerHTML='<div class="bad">Incorrecto: '+correct+'</div>';
pool.push(current);
}
}
}
</script>
</body>
</html>
